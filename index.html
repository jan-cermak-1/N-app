<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NETIO · Prototypy</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;
    background:#0d0d14;
    color:#f2f2f7;
    font-family:-apple-system,'Helvetica Neue',sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:48px 24px 80px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  h1{
    font-size:22px;
    font-weight:700;
    letter-spacing:-0.4px;
    margin-bottom:8px;
    color:#fff;
  }
  .sub{
    font-size:14px;
    color:rgba(235,235,245,.55);
    margin-bottom:32px;
    text-align:center;
    max-width:360px;
    line-height:1.45;
  }
  nav{
    width:100%;
    max-width:393px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  a{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 18px;
    border-radius:14px;
    background:#1c1c1e;
    border:1px solid rgba(255,255,255,.08);
    color:#fff;
    text-decoration:none;
    font-size:16px;
    font-weight:600;
    letter-spacing:-0.3px;
    transition:background .15s,border-color .15s;
  }
  a:hover,a:focus-visible{
    background:#2c2c2e;
    border-color:rgba(0,200,120,.35);
    outline:none;
  }
  a span.desc{
    font-size:13px;
    font-weight:500;
    color:rgba(235,235,245,.5);
    margin-top:4px;
    display:block;
  }
  a .arrow{
    color:#00c878;
    font-size:18px;
    flex-shrink:0;
    margin-left:12px;
  }
  .wrap{flex:1;min-width:0}
  footer{
    margin-top:auto;
    padding-top:40px;
    font-size:12px;
    color:rgba(235,235,245,.35);
  }
</style>
</head>
<body>
  <h1>NETIO · iOS prototypy</h1>
  <p class="sub">Vyber roli — otevře se interaktivní náhled (stejná složka jako tento soubor).</p>
  <nav>
    <a href="netio-technician-ios.html">
      <div class="wrap">
        Admin
        <span class="desc">Organizace, zařízení, skupiny, nastavení</span>
      </div>
      <span class="arrow" aria-hidden="true">›</span>
    </a>
    <a href="netio-enduser-ios.html">
      <div class="wrap">
        User
        <span class="desc">Výstupy, omezená správa</span>
      </div>
      <span class="arrow" aria-hidden="true">›</span>
    </a>
    <a href="netio-fieldtech-ios.html">
      <div class="wrap">
        Support technik
        <span class="desc">Dočasný přístup, NFC, diagnostika</span>
      </div>
      <span class="arrow" aria-hidden="true">›</span>
    </a>
  </nav>
  <footer>Soubory: styles.css · app.js</footer>
</body>
</html>
